name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libudev-dev
        # Required for PyQt5/PyInstaller on Linux
        sudo apt-get install -y build-essential libgl1-mesa-glx xvfb qtbase5-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r test-requirements.txt

    - name: Run Tests
      if: runner.os != 'Linux'
      run: |
        python -m pytest src/main/python/test/
        
    - name: Run Tests (Linux with xvfb)
      if: runner.os == 'Linux'
      run: |
        xvfb-run -a python -m pytest src/main/python/test/

    - name: Build Executable
      run: |
        # Use pyinstaller directly
        pyinstaller --noconfirm --onedir --windowed --name "vial-gui" --add-data "src/main/resources:src/main/resources" --add-data "src/main/python:src/main/python" src/main/python/main.py

    - name: Zip Executable (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        cd dist
        zip -r vial-gui-${{ runner.os }}.zip vial-gui
        
    - name: Zip Executable (Windows)
      if: runner.os == 'Windows'
      run: |
        cd dist
        Compress-Archive -Path vial-gui -DestinationPath vial-gui-Windows.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: executable-${{ runner.os }}
        path: dist/vial-gui-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
